<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tablas de multiplicar</title>
  <link rel="stylesheet" href="multiplicar.css">
  <script src="multiplicar.js" defer></script>
</head>
<body>

  <main class="tarjeta">
    <h1>Tablas de multiplicar</h1>
    <p class="instruccion">Escribe un número y presiona <b>PROBAR</b> para ver su tabla.</p>

    <div class="controles">
      <input type="number" id="txtNumero" placeholder="Escribe un número (ej: 8)">
      <button class="btn" onclick="generarTablas()">PROBAR</button>
    </div>

    <div class="tabla" id="tabla">
      <div class="fila">3 × 1 = 3</div>
      <div class="fila">3 × 2 = 6</div>
      <div class="fila">3 × 3 = 9</div>
      <div class="fila">3 × 4 = 12</div>
      <div class="fila">3 × 5 = 15</div>
      <div class="fila">3 × 6 = 18</div>
      <div class="fila">3 × 7 = 21</div>
      <div class="fila">3 × 8 = 24</div>
      <div class="fila">3 × 9 = 27</div>
      <div class="fila">3 × 10 = 30</div>
      <div class="fila">3 × 11 = 33</div>
      <div class="fila">3 × 12 = 36</div>
    </div>

    <footer class="pie">Creado por: Walde Farré</footer>
  </main>

</body>
</html>
